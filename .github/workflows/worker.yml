name: Football AI Worker
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

# Voorkom dat twee workers tegelijk draaien
concurrency:
  group: football-worker
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Pull altijd de laatste versie voor de push
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run worker
        run: node scripts/server-worker.js

      - name: Commit en push data
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add server_data.json
          git diff --staged --quiet && echo "geen wijzigingen" && exit 0
          git commit -m "update wedstrijden [skip vercel]"
          # Pull eerst om merge conflicts te voorkomen, dan push
          git pull --rebase origin main
          git push origin main
