name: Football AI Worker
on:
  schedule:
    - cron: "*/30 * * * *"  # Elke 30 minuten
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run worker
        run: node scripts/server-worker.js
      - name: Commit data
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add server_data.json
          git commit -m "update wedstrijden [skip vercel]" || echo "geen wijzigingen"
          git push
