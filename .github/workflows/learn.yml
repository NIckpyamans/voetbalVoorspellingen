name: leren

on:
  schedule:
    - cron: '0 */6 * * *'  # Elke 6 uur
  workflow_dispatch:  # Handmatig kunnen triggeren

permissions:
  contents: write

jobs:
  learn:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run learning script
        run: node scripts/server-worker.js
      
      - name: Commit and push if changed
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add server_data.json
          git diff --quiet && git diff --staged --quiet || git commit -m "update learning data [skip vercel]"
          git pull origin main --no-rebase --strategy-option=ours
          git push
