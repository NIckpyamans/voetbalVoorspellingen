name: Server-side learning
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  learn:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run server worker
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/server-worker.js

      - name: Commit data
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add .
          # [skip vercel] voorkomt onnodige Vercel deploys bij data updates
          git commit -m "update learning data [skip vercel]" || echo "no changes"
          git push
