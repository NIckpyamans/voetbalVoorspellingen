name: Server-side learning
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: {}

# Voorkom conflicten met de worker
concurrency:
  group: football-worker
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  learn:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Run server worker
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/server-worker.js

      - name: Commit en push data
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add server_data.json
          git diff --staged --quiet && echo "geen wijzigingen" && exit 0
          git commit -m "update learning data [skip vercel]"
          git pull --rebase origin main
          git push origin main
